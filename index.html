<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meme Scanner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 16px; max-width: 480px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    h1 { font-size: 20px; color: #a78bfa; font-weight: 700; }
    .live { font-size: 11px; background: #14532d; color: #34d399; padding: 3px 8px; border-radius: 20px; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid #2a2a2a; background: #1a1a1a; color: #888; font-size: 12px; cursor: pointer; }
    .filter-btn.active { background: #a78bfa; color: #fff; border-color: #a78bfa; }
    .token { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
    .token:hover { border-color: #a78bfa; }
    .token-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .token-name { font-size: 15px; font-weight: 700; }
    .token-chain { font-size: 11px; background: #1e1b4b; color: #a78bfa; padding: 2px 8px; border-radius: 10px; }
    .token-addr { font-size: 11px; color: #444; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .token-bottom { display: flex; gap: 8px; }
    .tag { font-size: 11px; padding: 3px 8px; border-radius: 8px; background: #1a1a1a; color: #666; }
    .tag-new { background: #14532d; color: #34d399; }
    .loading { color: #444; font-size: 13px; text-align: center; padding: 40px 0; }
    .count { font-size: 12px; color: #444; margin-bottom: 12px; }
    .refresh { font-size: 11px; color: #444; text-align: center; padding: 16px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Meme Scanner</h1>
    <span class="live" id="live-badge">LIVE</span>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterChain('all', this)">All chains</button>
    <button class="filter-btn" onclick="filterChain('solana', this)">Solana</button>
    <button class="filter-btn" onclick="filterChain('ethereum', this)">ETH</button>
    <button class="filter-btn" onclick="filterChain('bsc', this)">BSC</button>
  </div>

  <div class="count" id="count"></div>
  <div id="tokens"><p class="loading">Loading new tokens...</p></div>
  <div class="refresh" id="refresh-time"></div>

  <script>
    let allTokens = [];
    let currentChain = 'all';

    async function fetchTokens() {
      try {
        const res = await fetch('https://api.dexscreener.com/token-profiles/latest/v1');
        allTokens = await res.json();
        renderTokens();
        const now = new Date();
        document.getElementById('refresh-time').textContent = 'Last updated: ' + now.toLocaleTimeString();
      } catch(e) {
        document.getElementById('tokens').innerHTML = '<p class="loading">Error loading — retrying...</p>';
      }
    }

    function renderTokens() {
      const filtered = currentChain === 'all' ? allTokens : allTokens.filter(t => t.chainId === currentChain);
      const container = document.getElementById('tokens');
      document.getElementById('count').textContent = filtered.length + ' tokens found';
      
      if(filtered.length === 0) {
        container.innerHTML = '<p class="loading">No tokens found for this filter</p>';
        return;
      }

      container.innerHTML = '';
      filtered.slice(0, 30).forEach(token => {
        const short = token.tokenAddress ? token.tokenAddress.slice(0,6) + '...' + token.tokenAddress.slice(-4) : 'Unknown';
        const div = document.createElement('div');
        div.className = 'token';
        div.onclick = () => window.open('https://dexscreener.com/' + token.chainId + '/' + token.tokenAddress, '_blank');
        div.innerHTML = `
          <div class="token-top">
            <span class="token-name">${token.description ? token.description.slice(0,20) : 'New Token'}</span>
            <span class="token-chain">${token.chainId || 'unknown'}</span>
          </div>
          <div class="token-addr">${token.tokenAddress || 'N/A'}</div>
          <div class="token-bottom">
            <span class="tag tag-new">New listing</span>
            <span class="tag">${short}</span>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function filterChain(chain, btn) {
      currentChain = chain;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTokens();
    }

    let seenTokens = new Set();

    function notify(token) {
      if(Notification.permission === 'granted') {
        new Notification('New Solana token detected!', {
          body: (token.description || 'Unknown token') + '\n' + token.tokenAddress,
          icon: 'https://dexscreener.com/favicon.ico'
        });
      }
    }

    async function fetchAndNotify() {
      const prevCount = seenTokens.size;
      await fetchTokens();
      allTokens.filter(t => t.chainId === 'solana').forEach(token => {
        if(!seenTokens.has(token.tokenAddress)) {
          seenTokens.add(token.tokenAddress);
          if(prevCount > 0) notify(token);
        }
      });
    }

    Notification.requestPermission().then(permission => {
      if(permission === 'granted') {
        new Notification('Meme Scanner is live!', {
          body: 'You will be notified when new Solana tokens appear',
          icon: 'https://dexscreener.com/favicon.ico'
        });
      }
    });

    fetchAndNotify();
    setInterval(fetchAndNotify, 30000);
  </script>
</body>
</html>
